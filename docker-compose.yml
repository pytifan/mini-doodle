version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini-doodle-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=minidoodle
      - DB_USERNAME=minidoodle
      - DB_PASSWORD=minidoodle
      - SPRING_PROFILES_ACTIVE=default
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mini-doodle-net

  postgres:
    image: postgres:16-alpine
    container_name: mini-doodle-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=minidoodle
      - POSTGRES_USER=minidoodle
      - POSTGRES_PASSWORD=minidoodle
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minidoodle"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mini-doodle-net

volumes:
  postgres-data:

networks:
  mini-doodle-net:
    driver: bridge
